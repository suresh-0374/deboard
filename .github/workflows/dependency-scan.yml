# Goal i have to ensure  dependency and ppackages have been audited for security
name: dependency scan
on:
    workflow_call:
jobs:
    dependecny-scan:
        runs-on: ubuntu-latest
        steps:
            - name: checkout
              uses: actions/checkout@v7
            - name: set up go
              uses: actions/setup-go@v4
              with:
                go-version: 1.23
            - name: install govulnche
              run: go install golang.org/x/vuln/cmd/govulncheck@latest
            - name: check govulncheck
              run: govulncheck ./...
              working-directory: backend
            - name:  setup nodejs
              uses: actions/setup-node@v6
              with:
                node-version: '20'
                cache: npm
                cache-dependency-path: frontend/package-lock.json
            - name: scane dependency for node
              run: npm audit
              working-directory: frontend
