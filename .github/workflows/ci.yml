# GOAL I have to build, test the code for frontend and backend 
# then push images to dockerhub
name: CI
on:
  push:
    paths-ignore:
      -  '.github/workflows/**'
    branches: [main]
jobs:
   frontend:
      runs-on: ubuntu-latest
      steps:
      - name: checkout code
        uses: actions/checkout@v7
      - name: run tests
        run: npm run test
        working-directory: frontend
      - name: docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: docker build and push
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devboard-frontend:latest
        
       
        
     ## - Test
     # - Push
   backend:
      runs-on: ubuntu-latest
      steps:
      - name: checkout code
        uses: actions/checkout@v7
      - name: run tests
        run: go test
        working-directory: backend
      - name: docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: docker build and push
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devboard-backend:latest