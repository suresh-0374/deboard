# GOAL I have to build, test the code for frontend and backend
# then push images to dockerhub
name: CI
on:
  push:
    branches: [main]
jobs:
   frontend:
      runs-on: ubuntu-latest
      steps:
      - name: checkout code
        uses: actions/checkout@v7
      - name: linter setup nodejs
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: install npm packages
        run: npm ci
      - name: run linter
        run: npm run lint
      - name: run tests
        run: npm run test
       
        
