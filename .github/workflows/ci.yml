# GOAL I have to build, test the code for frontend and backend 
# then push images to dockerhub
name: CI
on:
  push:
    paths-ignore:
      -  '.github/workflows/*'
    branches: [main]
jobs:
   frontend:
      runs-on: ubuntu-latest
      steps:
      - name: checkout code
        uses: actions/checkout@v7
      - name: linter setup nodejs
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: install npm packages
        run: npm ci
        working-directory: frontend
      - name: run linter
        run: npm run lint
        working-directory: frontend
      - name: run tests
        run: npm run test
        working-directory: frontend
      - name: docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: docker build and push
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devboard-frontend:latest
        
       
        
     ## - Test
     # - Push
   backend:
      runs-on: ubuntu-latest
      steps:
      - name: checkout code
        uses: actions/checkout@v7
      - name: linter setup go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          go-version-file: 'go.mod'
          check-latest: false
          cache-dependency-path: backend/go.sum
      - name: run go for fmt
        run: go fmt
        working-directory: backend
      - name: rub for go vet
        run: go vet
        working-directory: backend
      - name: run tests
        run: go test
        working-directory: backend
      - name: docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: docker build and push
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devboard-backend:latest