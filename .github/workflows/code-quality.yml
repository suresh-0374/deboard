# Goal - I have to do sast for code
name: code quality
on:
    workflow_call:
jobs:
    sast:
        runs-on: ubuntu-latest
        steps:
            - name: checkout
              uses: actions/checkout@v7
            - name: linter setup nodejs
              uses: actions/setup-node@v6
              with:
                node-version: '20'
                cache: npm
                cache-dependency-path: frontend/package-lock.json
            - name: install npm packages
              run: npm ci
              working-directory: frontend
            - name: run linter
              run: npm run lint
              working-directory: frontend
            - name: linter setup go
              uses: actions/setup-go@v6
              with:
                go-version: '1.23'
                go-version-file: 'go.mod'
                check-latest: false
                cache-dependency-path: backend/go.sum
            - name: run go for fmt
              run: go fmt
              working-directory: backend
            - name: rub for go vet
              run: go vet
              working-directory: backend

    
