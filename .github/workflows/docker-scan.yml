# docker files and socker images are security tested 
name: docker scan
on:
    workflow_call:
jobs:
    dockerfile-lint-and-scan:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                folders: ['backend','frontend']
        steps:
            - name: checkout
              uses: actions/checkout@v4
            - name: dockerfile lint
              uses: hadolint/hadolint-action@v3.1.0
              with:
                dockerfile: ${{ matrix.folders }}/Dockerfile
            - name: docker login
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            - name: docker build ${{ matrix.folders }}
              run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devboard-${{ matrix.folders }}:latest .
              working-directory: ${{ matrix.folders }}
            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                image-ref: ${{ secrets.DOCKER_USERNAME }}/devboard-${{ matrix.folders }}:latest
                format: 'table'
                exit-code: '1'
                ignore-unfixed: true
                vuln-type: 'os,library'
                severity: 'CRITICAL,HIGH'
